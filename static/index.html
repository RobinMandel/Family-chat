<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:#2a2e3d;
  --text:#e2e8f0;--text-muted:#8892a8;--accent:#6366f1;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;padding:1rem}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:1.5rem;margin-bottom:.25rem}
.login-box p{color:var(--text-muted);margin-bottom:1.5rem;font-size:.9rem}
.login-box input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:.75rem;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:.75rem;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.login-box button:hover{opacity:.9}
.login-error{color:#f87171;font-size:.85rem;margin-top:.5rem;min-height:1.2em}
/* CHAT */
.chat-app{display:none;flex-direction:column;height:100vh}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--surface);border-bottom:1px solid var(--border)}
.chat-header h1{font-size:1.1rem;font-weight:600}
.header-right{display:flex;align-items:center;gap:.75rem}
.user-pills{display:flex;gap:.35rem}
.user-pill{position:relative;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:2px solid var(--border)}
.user-pill .online-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid var(--surface)}
.user-pill .online-dot.offline{background:#4b5563}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-size:.8rem}
.logout-btn:hover{border-color:var(--text-muted)}
/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
.msg{display:flex;gap:.65rem;max-width:85%;animation:fadeIn .2s ease}
.msg.mine{align-self:flex-end;flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:#fff;font-weight:700}
.msg-body{display:flex;flex-direction:column;gap:.15rem}
.msg-meta{display:flex;align-items:center;gap:.5rem;font-size:.75rem}
.msg-sender{font-weight:600}
.msg-time{color:var(--text-muted)}
.msg.mine .msg-meta{flex-direction:row-reverse}
.msg-text{padding:.6rem .9rem;border-radius:12px;font-size:.925rem;line-height:1.45;word-break:break-word;background:var(--surface2);border:1px solid var(--border)}
.msg.mine .msg-text{border-bottom-right-radius:4px}
.msg:not(.mine) .msg-text{border-bottom-left-radius:4px}
/* INPUT */
.chat-input{display:flex;gap:.5rem;padding:.75rem 1rem;background:var(--surface);border-top:1px solid var(--border)}
.chat-input input{flex:1;padding:.7rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.95rem;outline:none}
.chat-input input:focus{border-color:var(--accent)}
.chat-input button{padding:.7rem 1.25rem;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;white-space:nowrap}
.chat-input button:hover{opacity:.9}
.chat-input button:disabled{opacity:.5;cursor:not-allowed}
/* SCROLLBAR */
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* MOBILE */
@media(max-width:600px){
  .msg{max-width:92%}
  .chat-header h1{font-size:.95rem}
  .user-pill{width:28px;height:28px;font-size:.75rem}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <h1>FamilyChat</h1>
    <p>Sign in to the family group chat</p>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="chat-app" id="chatApp">
  <div class="chat-header">
    <h1>FamilyChat</h1>
    <div class="header-right">
      <div class="user-pills" id="userPills"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const USERS = {
  robin: { emoji: '\u{1F9D1}\u200D\u2695\uFE0F', color: '#38bdf8' },
  papa:  { emoji: '\u{1F474}', color: '#fb923c' },
  jarvis:{ emoji: '\u{1F916}', color: '#a78bfa' },
  bolla: { emoji: '\u{1F43E}', color: '#34d399' },
};

let currentUser = null;
let lastTimestamp = 0;
let pollTimer = null;

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (!username || !password) { errEl.textContent = 'Enter username and password'; return; }

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'include',
    });
    if (!res.ok) { errEl.textContent = 'Invalid credentials'; return; }
    const data = await res.json();
    currentUser = data.user;
    showChat();
  } catch { errEl.textContent = 'Connection error'; }
}

async function checkSession() {
  try {
    const res = await fetch('/me', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      currentUser = data.user;
      showChat();
      return;
    }
  } catch {}
  document.getElementById('loginScreen').style.display = 'flex';
}

function showChat() {
  document.getElementById('loginScreen').style.display = 'none';
  const app = document.getElementById('chatApp');
  app.style.display = 'flex';
  loadMessages();
  pollTimer = setInterval(pollMessages, 3000);
  setInterval(pollUsers, 15000);
  pollUsers();
  document.getElementById('msgInput').focus();
}

async function doLogout() {
  clearInterval(pollTimer);
  await fetch('/logout', { method: 'POST', credentials: 'include' });
  currentUser = null;
  document.getElementById('chatApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

async function loadMessages() {
  try {
    const res = await fetch('/api/messages?limit=100', { credentials: 'include' });
    if (!res.ok) return;
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    data.messages.forEach(m => appendMessage(m));
    if (data.messages.length) lastTimestamp = data.messages[data.messages.length - 1].timestamp;
    scrollToBottom();
  } catch {}
}

async function pollMessages() {
  try {
    const res = await fetch(`/api/messages?since=${lastTimestamp}&limit=50`, { credentials: 'include' });
    if (!res.ok) return;
    const data = await res.json();
    if (!data.messages.length) return;
    data.messages.forEach(m => appendMessage(m));
    lastTimestamp = data.messages[data.messages.length - 1].timestamp;
    scrollToBottom();
  } catch {}
}

async function pollUsers() {
  try {
    const res = await fetch('/api/users', { credentials: 'include' });
    if (!res.ok) return;
    const data = await res.json();
    const container = document.getElementById('userPills');
    container.innerHTML = data.users.map(u =>
      `<div class="user-pill" style="border-color:${u.color}" title="${u.name}">
        ${u.emoji}
        <span class="online-dot ${u.online ? '' : 'offline'}"></span>
      </div>`
    ).join('');
  } catch {}
}

function appendMessage(m) {
  const container = document.getElementById('messages');
  const isMine = m.sender === currentUser;
  const u = USERS[m.sender] || { emoji: '?', color: '#888' };
  const t = new Date(m.timestamp * 1000);
  const time = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const div = document.createElement('div');
  div.className = `msg ${isMine ? 'mine' : ''}`;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${u.color}">${u.emoji}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-sender" style="color:${u.color}">${m.sender}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${escapeHtml(m.text)}</div>
    </div>`;
  container.appendChild(div);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';

  try {
    const res = await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      credentials: 'include',
    });
    if (res.ok) {
      const m = await res.json();
      appendMessage(m);
      lastTimestamp = m.timestamp;
      scrollToBottom();
    }
  } catch {}
  btn.disabled = false;
  input.focus();
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

checkSession();
</script>
</body>
</html>
